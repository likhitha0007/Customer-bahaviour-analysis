<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>index</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="{% static 'img/favicon.ico' %}" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Ubuntu:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{% static 'lib/animate/animate.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
</head>

<body class="bg-white">
    <!-- Spinner Start -->
    <div id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
    <!-- Spinner End -->


   <!-- Main Title Navbar -->
<div class="container-fluid bg-dark sticky-top">
    <div class="container text-center py-3">
        <h1 class="text-white m-0" style="font-size:1.8rem;">
            CUSTOMER BEHAVIOUR ANALYSIS USING DATA MINING TECHNIQUES WITH AI-DRIVEN RECOMMENDATIONS
        </h1>
    </div>
</div>

<!-- Sub Navbar -->
<div class="container-fluid bg-secondary">
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-dark justify-content-center">
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#subNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="subNavbar">
                <div class="navbar-nav">
                    <a href="{% url 'user_home' %}" class="nav-item nav-link active">USER HOME</a>
                    <a href="{% url 'behavior_graph' %}" class="nav-item nav-link">BEHAVIOUR ANALYSIS GRAPH</a>
                    
                    <a href="{% url 'enter_test_data' %}" class="nav-item nav-link">ENTER TEST DATA</a>
                    <a href="{% url 'recommend_category' %}" class="nav-item nav-link">RECOMMEND CATEGORY</a>
                    <a href="{% url 'user_logout' %}" class="nav-item nav-link">LOGOUT</a>
                </div>
            </div>
        </nav>
    </div>
</div>

    <!-- Detector Hero Section -->
<!-- Carousel Start -->
<div class="container-fluid p-0" style="position: relative; height: 100vh; overflow: hidden;">
    <div id="blog-carousel" class="carousel slide h-100" data-bs-ride="carousel">
        <div class="carousel-inner h-100">
            <div class="carousel-item active h-100">
                <!-- Background Image -->
                <img class="w-100 h-100" src="{% static 'img/index.png' %}" alt="Image" style="object-fit: cover;">
                
                <!-- Overlay -->
                <div style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index:1;"></div>

                <!-- Centered Caption -->
                <div class="carousel-caption d-flex flex-column align-items-center justify-content-center h-100" style="z-index:2;">
                    <h4 style="color: white; font-size: 40px; text-align: center;">Welcome, {{ username }}!</h4>
                    <p style="color: white; font-size: 20px; text-align: center;">You successfully logged in.</p>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Carousel End -->


     <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top pt-2"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'lib/wow/wow.min.js' %}"></script>
    <script src="{% static 'lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'lib/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>

    <!-- Template Javascript -->
    <script src="{% static 'js/main.js' %}"></script>
</body>

</html>
