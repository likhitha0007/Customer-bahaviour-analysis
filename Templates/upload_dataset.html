<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Index</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="{% static 'img/favicon.ico' %}" rel="icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Ubuntu:wght@500;700&display=swap" rel="stylesheet">

    <!-- Icon Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap and Libraries -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/animate/animate.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">

    <!-- Template CSS -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <style>
        /* Fullscreen overlay and center */
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            background: url("{% static 'img/upload.png' %}") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            flex-direction: column;
        }

        .welcome-text {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        .upload-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
        }

        .upload-card h4 {
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }

        .upload-card i {
            font-size: 50px;
            color: #007bff;
            margin-bottom: 15px;
        }

        .upload-card button {
            margin-top: 15px;
        }

        /* Navbar */
        .navbar-title {
            font-size: 1.8rem;
            color: white;
            flex: 1;
            text-align: center;
        }

        .navbar-links a {
            color: white;
            margin-left: 15px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="container-fluid bg-dark sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <h1 class="navbar-title m-0">
                CUSTOMER BEHAVIOUR ANALYSIS USING DATA MINING TECHNIQUES WITH AI-DRIVEN RECOMMENDATIONS
            </h1>
            <div class="navbar-links d-flex gap-3">
                <a href="{% url 'admin_home' %}" class="nav-link"><i class="fa fa-home"></i> Home</a>
                <a href="{% url 'admin_logout' %}" class="nav-link"><i class="fa fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <!-- Overlay -->
    <div class="overlay">
        <!-- Welcome Text -->
        <div class="welcome-text">Welcome Admin, Upload Dataset</div>

        <!-- Upload Box -->
        <div class="upload-card">
            <i class="fa fa-cloud-upload-alt"></i>
            <h4>Upload Dataset</h4>
            <p class="text-muted">Upload your dataset file for analysis.</p>

            {% if message %}
                <div class="alert alert-dark" style="color: black; background-color: #f8f9fa; border: 1px solid #000;">
                    {{ message }}
                </div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-upload"></i> Upload
                </button>
            </form>
        </div>
    </div>

    <!-- JS Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'lib/wow/wow.min.js' %}"></script>
    <script src="{% static 'lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'lib/counterup/counterup.min.js' %}"></script>
    <script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
